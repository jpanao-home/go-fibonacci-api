name: CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  APP_NAME: go-fibonacci-api
  OVERLAY: dev
  SSH_USERNAME: "student"
  PORTNUMBER: "8080"
  EC2_HOST: "63.179.97.131"

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/go-fibonacci-api

    outputs:
      SHORT_SHA: ${{ steps.vars.outputs.SHORT_SHA }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.26

      - name: Verify Go installation
        run: go version

      - name: Initialize Go module (if needed)
        run: |
          if [ ! -f go.mod ]; then
            go mod init go-math-api
          fi

      - name: Build the Go application
        run: CGO_ENABLED=0 go build -o main .

      - name: Run unit tests
        run: CGO_ENABLED=0 go test -v ./...

      - name: Get short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run:  docker build -t $IMAGE_NAME:${{ steps.vars.outputs.SHORT_SHA }} .

      - name: Push Docker image
        run: docker push $IMAGE_NAME:${{ steps.vars.outputs.SHORT_SHA }}
        steps:
        - name: Install sshpass
          run: sudo apt-get update && sudo apt-get install -y sshpass

        - name: Deploy container
          run: |
            PORT="${PORTNUMBER}"
            sshpass -p "${{ secrets.STUDENT_PASSWORD }}" \
              ssh -o StrictHostKeyChecking=no \
                  "${SSH_USERNAME}@${EC2_HOST}" \
                  "IMAGE_REF='$IMAGE_NAME:${{ steps.vars.outputs.SHORT_SHA }}' PORT='${PORT}' bash -s" << 'EOF'
            set -euo pipefail

            echo "Pulling image: ${IMAGE_REF}"
            docker pull "${IMAGE_REF}"

            echo "Stopping any container publishing port ${PORT} (if any)..."
            docker ps -q --filter "publish=${PORT}" | xargs -r docker stop

            echo "Running container on host port ${PORT} -> container 8080..."
            docker run -d -p "${PORT}:8080" "${IMAGE_REF}"

            echo "Current containers:"
            docker ps --format 'table {{.ID}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}'
            EOF